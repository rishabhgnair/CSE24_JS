<!DOCTYPE html>
<html>
<head>
    <title>Sum of N Numbers</title>
</head>
<body>

    <h2>Sum of N Numbers</h2>

    <script>
        let n = parseInt(prompt("Enter a number N:"));

        let sum = 0;

        for(let i = 1; i <= n; i++) {
            sum += i;
        }

        document.write("<h3>Sum of numbers from 1 to " + n + " is: " + sum + "</h3>");
    </script>

</body>
</html>
